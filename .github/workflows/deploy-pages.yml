name: Deploy Personal Dashboard PWA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate repository hygiene
        shell: bash
        run: |
          set -euo pipefail

          forbidden_files=(
            "app/config.json"
            ".env"
            ".env.local"
          )

          for file in "${forbidden_files[@]}"; do
            if git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              echo "::error::$file must not be committed"
              exit 1
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Create runtime config
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const config = {
            supabaseUrl: process.env.SUPABASE_URL,
            supabaseAnonKey: process.env.SUPABASE_ANON_KEY
          };

          const missing = Object.entries(config)
            .filter(([, value]) => !value)
            .map(([key]) => key);

          if (missing.length) {
            throw new Error(`Missing required runtime config: ${missing.join(", ")}`);
          }

          const url = new URL(config.supabaseUrl);
          if (url.protocol !== "https:" || !url.hostname.endsWith(".supabase.co")) {
            throw new Error("SUPABASE_URL must be an https://*.supabase.co URL");
          }

          if (config.supabaseAnonKey.includes("YOUR_") || config.supabaseAnonKey.length < 20) {
            throw new Error("SUPABASE_ANON_KEY is missing or still uses a placeholder");
          }

          const [, payload] = config.supabaseAnonKey.split(".");
          if (payload) {
            const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
            const decoded = JSON.parse(Buffer.from(normalized, "base64").toString("utf8"));
            if (decoded.role === "service_role") {
              throw new Error("SUPABASE_ANON_KEY contains a service_role token");
            }
          }

          fs.writeFileSync("app/config.json", `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Upload app folder
        uses: actions/upload-pages-artifact@v4
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
